name: jmh

run-name: jmh @ ${{ inputs.commit || github.sha }}

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - 'doc/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit SHA, branch, or tag to benchmark (defaults to HEAD of the selected branch)'
        required: false
        default: ''
      include:
        description: 'JMH benchmark regex filter (e.g. SerializeBenchmark)'
        required: false
        default: ''

jobs:
  jmh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit || github.sha }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JMH benchmarks
        run: |
          if [ -n "${{ inputs.include }}" ]; then
            ./gradlew :centurion-benchmarks:jmh -Pjmh.includes='${{ inputs.include }}'
          else
            ./gradlew :centurion-benchmarks:jmh
          fi

      - name: Render results to step summary
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: JMH Benchmark
          tool: jmh
          output-file-path: centurion-benchmarks/build/results/jmh/results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
          auto-push: false
          save-data-file: false
          skip-fetch-gh-pages: true

      - name: Upload raw JMH results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: jmh-results
          path: centurion-benchmarks/build/results/jmh/

env:
  GRADLE_OPTS: -Dorg.gradle.configureondemand=true -Dorg.gradle.parallel=false -Dorg.gradle.jvmargs="-Xmx3g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
